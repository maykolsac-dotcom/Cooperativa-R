function setSyncStatus(s){
  syncStatus=s;
  const dot=qs('.sync-dot');
  const txt=qs('.sync-txt');
  if(!dot||!txt)return;
  dot.className='sync-dot '+s;
  const msgs={ok:'Guardado en Google Drive',saving:'Guardando...',error:'Error al guardar — reintentando',offline:'Sin conexión a Drive'};
  txt.textContent=msgs[s]||s;
}

async function driveRequest(url, opts={}){
  const res = await fetch(url,{...opts,headers:{...opts.headers,'Authorization':'Bearer '+accessToken}});
  if(res.status===401){accessToken=null;render();throw new Error('Token expirado');}
  return res;
}

async function buscarOCrearArchivo(nombre){
  // Buscar en Drive (appDataFolder para privacidad o root)
  const q = encodeURIComponent(`name='${nombre}' and trashed=false`);
  const r = await driveRequest(`https://www.googleapis.com/drive/v3/files?q=${q}&fields=files(id,name)&spaces=drive`);
  const d = await r.json();
  if(d.files&&d.files.length>0) return d.files[0].id;
  // Crear archivo nuevo
  const meta = JSON.stringify({name:nombre,mimeType:'application/json'});
  const cr = await driveRequest('https://www.googleapis.com/drive/v3/files',{
    method:'POST',headers:{'Content-Type':'application/json'},body:meta
  });
  const f = await cr.json();
  return f.id;
}

async function leerArchivoJSON(fileId){
  const r = await driveRequest(`https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`);
  if(r.status===404) return null;
  try{ return await r.json(); }catch(e){ return null; }
}

async function guardarArchivoJSON(fileId, data){
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const r = await driveRequest(
    `https://www.googleapis.com/upload/drive/v3/files/${fileId}?uploadType=media`,
    {method:'PATCH',headers:{'Content-Type':'application/json'},body:blob}
  );
  return r.ok;
}

// Guardar datos con debounce de 1.5s
function programarGuardado(){
  setSyncStatus('saving');
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>ejecutarGuardado(),1500);
}

async function ejecutarGuardado(){
  if(!driveFileId||!accessToken)return;
  try{
    const ok = await guardarArchivoJSON(driveFileId,{
      socios:STATE.socios, aportes:STATE.aportes,
      prestamos:STATE.prestamos, pagos:STATE.pagos, nombre:STATE.nombre,
      ultimaActualizacion:new Date().toISOString(),
      actualizadoPor:currentUser?.email||'desconocido'
    });
    setSyncStatus(ok?'ok':'error');
    if(!ok)setTimeout(ejecutarGuardado,5000);
  }catch(e){setSyncStatus('error');setTimeout(ejecutarGuardado,5000);}
}

async function cargarDatosDesdesDrive(){
  if(!driveFileId)return;
  const d = await leerArchivoJSON(driveFileId);
  if(d){
    STATE.socios    = d.socios    || [...DEFAULT_SOCIOS];
    STATE.aportes   = d.aportes   || DEFAULT_AP.map(a=>({...a}));
    STATE.prestamos = d.prestamos || DEFAULT_PR.map(p=>({...p}));
    STATE.pagos     = d.pagos     || [];
    STATE.nombre    = d.nombre    || 'Cooperativa';
  }
}

// ── Auto-sincronización cada 30 segundos ─────────────────────────
let syncInterval=null, ultimaActualizacionRemota=null;

async function verificarCambiosRemotos(){
  if(!driveFileId||!accessToken||syncStatus==='saving')return;
  try{
    const r=await driveRequest(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`);
    if(!r.ok)return;
    const meta=await r.json();
    const remota=meta.modifiedTime;
    if(ultimaActualizacionRemota&&remota!==ultimaActualizacionRemota){
      const vista=STATE.view;
      await cargarDatosDesdesDrive();
      STATE.view=vista;
      render();
      const txt=qs('.sync-txt');
      if(txt){txt.textContent='✨ Datos actualizados';setTimeout(()=>setSyncStatus('ok'),2500);}
    }
    ultimaActualizacionRemota=remota;
  }catch(e){}
}

function iniciarSyncAutomatico(){
  if(syncInterval)clearInterval(syncInterval);
  driveRequest(`https://www.googleapis.com/drive/v3/files/${driveFileId}?fields=modifiedTime`)
    .then(r=>r.json()).then(m=>{ultimaActualizacionRemota=m.modifiedTime;}).catch(()=>{});
  syncInterval=setInterval(verificarCambiosRemotos,30000);
}

function detenerSyncAutomatico(){
  if(syncInterval){clearInterval(syncInterval);syncInterval=null;}
}

async function cargarPermisos(){
  if(!permFileId)return;
  const d = await leerArchivoJSON(permFileId);
  if(d&&Array.isArray(d.permisos)) permisos=d.permisos;
}

async function guardarPermisos(){
  if(!permFileId)return;
  await guardarArchivoJSON(permFileId,{permisos});
}

function getRolUsuario(email){
  if(!email)return 'lector';
  const p=permisos.find(x=>x.email.toLowerCase()===email.toLowerCase());
  return p?p.rol:'lector';
}

let gapiReady=false, gsiReady=false;

window.onGapiLoad = function(){
  gapi.load('client',async()=>{
    await gapi.client.init({apiKey:CONFIG.API_KEY,discoveryDocs:[]});
    gapiReady=true; intentarAutoLogin();
  });
};

window.onGsiLoad = function(){
  if(!CONFIG_LISTO){ render(); return; }
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    // Sin prompt para reutilizar sesión existente sin popup
    callback: (resp) => {
      if(resp.error || !resp.access_token){
        console.error('Error token:', resp);
        STATE.cargando=false; render();
        toast('❌ Error al obtener acceso de Google');
        return;
      }
      accessToken = resp.access_token;
      // Usar el token inmediatamente, sin delay
      finalizarLogin();
    }
  });
  gsiReady=true; intentarAutoLogin();
};

function intentarAutoLogin(){
  if(!gapiReady||!gsiReady) return;
  render();
}

async function finalizarLogin(){
  STATE.cargando=true; render();
  try{
    // Obtener info del usuario usando el token recién recibido
    const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo',{
      headers:{'Authorization':'Bearer '+accessToken}
    });
    if(!r.ok){
      const txt = await r.text();
      throw new Error('Error userinfo '+r.status+': '+txt);
    }
    currentUser = await r.json();
    if(!currentUser||!currentUser.email) throw new Error('No se recibió email');

    // Buscar/crear archivos JSON en Drive
    driveFileId  = await buscarOCrearArchivo(CONFIG.DATA_FILE);
    permFileId   = await buscarOCrearArchivo(CONFIG.PERM_FILE);

    // Cargar permisos
    await cargarPermisos();
    if(permisos.length===0){
      permisos=[{email:currentUser.email, nombre:currentUser.name||currentUser.email, rol:'admin'}];
      await guardarPermisos();
    }
    currentRole = getRolUsuario(currentUser.email);

    // Cargar datos
    await cargarDatosDesdesDrive();

    STATE.cargando=false; setSyncStatus('ok'); render();
    // Iniciar sync automático cada 30s
    iniciarSyncAutomatico();
  }catch(e){
    console.error('finalizarLogin error:', e);
    STATE.cargando=false; accessToken=null; driveFileId=null; permFileId=null;
    render();
    toast('❌ '+e.message);
  }
}

function iniciarLogin(){
  if(!CONFIG_LISTO){ abrirModal('setup'); return; }
  if(!gsiReady){ toast('⏳ Cargando Google...'); return; }
  // prompt:'' reutiliza sesión activa sin popup extra
  tokenClient.requestAccessToken({prompt:''});
}

function cerrarSesion(){
  try{ if(accessToken) google.accounts.oauth2.revoke(accessToken,()=>{}); }catch(e){}
  accessToken=null; currentUser=null; currentRole=null; driveFileId=null; permFileId=null;
  clearTimeout(saveTimer); detenerSyncAutomatico(); render();
}

function estadoEfectivo(p){
  if(p.estado==='PAGADO')return 'PAGADO';
  if(p.estado==='VENCIDO')return 'VENCIDO';
  const hoy=hoyStr();
  if(p.fechaVenc&&p.fechaVenc<hoy)return 'VENCIDO';
  return 'PENDIENTE';
}
function calcular(){
  const{aportes,prestamos,pagos,socios}=STATE;
  const totalCap=aportes.reduce((s,a)=>s+(+a.monto),0);
  const prestAct=prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').reduce((s,p)=>s+(+p.monto),0);
  const cajaCap=totalCap-prestAct;
  const intCob=prestamos.filter(p=>estadoEfectivo(p)==='PAGADO').reduce((s,p)=>s+getInt(p),0);
  const reserva=intCob*.10;
  const dist=intCob-reserva;
  const socData=socios.map(soc=>{
    const tot=aportes.filter(a=>a.socio===soc).reduce((s,a)=>s+(+a.monto),0);
    const pp=totalCap>0?tot/totalCap:0;
    const gan=dist*pp;
    const rec=pagos.filter(p=>p.socio===soc).reduce((s,p)=>s+(+p.monto),0);
    return{socio:soc,totalAp:tot,pct:pp,ganado:gan,recibido:rec,pendiente:gan-rec};
  });
  return{totalCap,prestAct,cajaCap,intCob,reserva,dist,
    pagados:prestamos.filter(p=>estadoEfectivo(p)==='PAGADO').length,
    pendientes:prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').length,
    vencidos:prestamos.filter(p=>estadoEfectivo(p)==='VENCIDO').length,
    socios:socData};
}
function badge(est,p){const ef=p?estadoEfectivo(p):est;const m={PAGADO:'p',PENDIENTE:'pen',VENCIDO:'v'};return`<span class="badge badge-${m[ef]||'pen'}">${ef}</span>`;}

const MESES_ES=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function renderCalendario(){
  const hoy=hoyStr();const year=STATE.calYear;const month=STATE.calMonth;
  const pendientes=STATE.prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE');
  const vencidos=STATE.prestamos.filter(p=>estadoEfectivo(p)==='VENCIDO');
  const byDate={};
  [...pendientes,...vencidos].forEach(p=>{const k=p.fechaVenc;if(!byDate[k])byDate[k]=[];byDate[k].push(p);});
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  const daysInPrev=new Date(year,month,0).getDate();
  let cells=[];
  for(let i=firstDay-1;i>=0;i--)cells.push({day:daysInPrev-i,month:month-1,year,other:true});
  for(let d=1;d<=daysInMonth;d++)cells.push({day:d,month,year,other:false});
  let rem=cells.length%7;if(rem!==0)for(let d=1;d<=7-rem;d++)cells.push({day:d,month:month+1,year,other:true});
  const calRows=[];for(let r=0;r<cells.length/7;r++)calRows.push(cells.slice(r*7,r*7+7));
  const calHtml=`<div class="cal-grid">
    ${['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(d=>`<div class="cal-head-cell">${d}</div>`).join('')}
    ${calRows.map(row=>row.map(cell=>{
      const yy=cell.year+(cell.month<0?-1:cell.month>11?1:0);
      const mm=((cell.month%12)+12)%12;
      const ds=yy+'-'+String(mm+1).padStart(2,'0')+'-'+String(cell.day).padStart(2,'0');
      const isToday=ds===hoy;const events=byDate[ds]||[];
      return`<div class="cal-cell${cell.other?' other-month':''}${isToday?' today':''}${events.length?' has-events':''}">
        <div class="cal-day-num">${cell.day}</div>
        ${events.slice(0,3).map(p=>{const ef=estadoEfectivo(p);const cls=ef==='VENCIDO'?'venc-pasado':(ds===hoy?'venc-hoy':'');
          return`<span class="cal-event ${cls}" title="${p.cliente} — ${sol(+p.monto+getInt(p))}">${p.cliente}</span>`;}).join('')}
        ${events.length>3?`<span style="font-size:9px;color:var(--text3)">+${events.length-3}</span>`:''}
      </div>`;}).join('')).join('')}
  </div>`;
  const proximos=pendientes.slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1).slice(0,12);
  return`<div style="padding:20px">
    <p class="sec-title">📅 Calendario de Préstamos</p><p class="sec-sub">Vencimientos pendientes</p>
    <div style="display:grid;grid-template-columns:1fr 300px;gap:20px;align-items:start">
      <div><div class="card card-pad">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="cal-nav">
            <button id="cal-prev">‹</button>
            <span class="cal-month-title">${MESES_ES[month]} ${year}</span>
            <button id="cal-next">›</button>
          </div>
          <button class="btn btn-outline btn-sm" id="cal-hoy">Hoy</button>
        </div>
        ${calHtml}
        <div class="cal-legend">
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#FFE0B2;border:1px solid var(--amb)"></div>Pendiente</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#FFEBEE;border:1px solid var(--red)"></div>Vencido</div>
          <div class="cal-legend-item"><div class="cal-legend-dot" style="background:#EEF4FF;border:2px solid var(--navy2)"></div>Hoy</div>
        </div>
      </div></div>
      <div><div class="card card-pad">
        <p style="font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Próximos vencimientos</p>
        ${proximos.length===0?`<p style="font-size:12px;color:var(--text3);text-align:center;padding:20px 0">Sin pendientes 🎉</p>`:`
        <div class="upcoming-list">${proximos.map(p=>{
          const d2=new Date(p.fechaVenc);
          const dias=Math.round((new Date(p.fechaVenc)-new Date(hoy))/(1000*60*60*24));
          const cls=dias===0?'venc-hoy':(dias<0?'venc-pasado':'');
          return`<div class="upcoming-item ${cls}">
            <div class="upcoming-date-box"><div class="upcoming-date-day">${d2.getUTCDate()}</div><div class="upcoming-date-mon">${MESES_ES[d2.getUTCMonth()].slice(0,3)}</div></div>
            <div style="flex:1;min-width:0">
              <p style="font-size:12.5px;font-weight:600;color:var(--text)">${p.cliente}</p>
              <p style="font-size:11px;color:var(--text3)">${sol(+p.monto+getInt(p))} · <span style="color:${dias<=3?'var(--amb)':'var(--text3)'}">${dias===0?'HOY':`${dias}d`}</span></p>
            </div>
            ${esEditor()?`<button class="btn btn-green btn-sm" data-pagar="${p.id}" style="flex-shrink:0">✓</button>`:''}
          </div>`;}).join('')}
        </div>`}
        ${vencidos.length>0?`<div style="margin-top:14px"><p style="font-size:11px;font-weight:600;color:var(--red);margin-bottom:8px">⚠️ Vencidos (${vencidos.length})</p>
          ${vencidos.map(p=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#FFF5F5;border-radius:8px;margin-bottom:4px;border:1px solid #EF9A9A">
            <div><p style="font-size:12px;font-weight:600;color:var(--red)">${p.cliente}</p>
            <p style="font-size:10.5px;color:#999">${p.fechaVenc} · ${sol(+p.monto+getInt(p))}</p></div>
            ${esEditor()?`<button class="btn btn-green btn-sm" data-pagar="${p.id}">✓ Cobrado</button>`:''}
          </div>`).join('')}
        </div>`:''}
      </div></div>
    </div>
  </div>`;
}

//  RENDER PRINCIPAL
// ══════════════════════════════════════════════════════════════════
function render(){
  const root=qs('#root');
  if(STATE.cargando){root.innerHTML=renderCargando();return;}
  if(!accessToken){root.innerHTML=renderLogin();bindLoginEvents();return;}
  const st=calcular();
  let html=renderHeader(st)+'<div id="content">';
  if(STATE.view==='dashboard')     html+=renderDashboard(st);
  else if(STATE.view==='prestamos')     html+=renderPrestamos();
  else if(STATE.view==='aportes')       html+=renderAportes();
  else if(STATE.view==='distribucion')  html+=renderDistribucion(st);
  else if(STATE.view==='pagos')         html+=renderPagos(st);
  else if(STATE.view==='calendario')    html+=renderCalendario();
  html+='</div>';
  root.innerHTML=html;
  bindMainEvents(st);
}

function bindLoginEvents(){
  // No hace falta, los botones usan onclick inline
}

function bindMainEvents(st){
  qs('#btn-ai')?.addEventListener('click',()=>getAI(st));
  qs('#close-ai')?.addEventListener('click',()=>{STATE.aiText='';render();});
  qs('#btn-export')?.addEventListener('click',exportarExcel);
  qs('#btn-config')?.addEventListener('click',()=>abrirModal('config'));
  qs('#btn-permisos')?.addEventListener('click',()=>abrirModal('permisos'));
  document.querySelectorAll('.nav-btn').forEach(b=>b.addEventListener('click',()=>{STATE.view=b.dataset.view;render();}));
  if(esEditor()){
    qs('#btn-np')?.addEventListener('click',()=>abrirModal('prestamo'));
    qs('#btn-na')?.addEventListener('click',()=>abrirModal('aporte'));
    qs('#btn-npago')?.addEventListener('click',()=>abrirModal('pago',null,st));
  }
  qs('#cal-prev')?.addEventListener('click',()=>{STATE.calMonth--;if(STATE.calMonth<0){STATE.calMonth=11;STATE.calYear--;}render();});
  qs('#cal-next')?.addEventListener('click',()=>{STATE.calMonth++;if(STATE.calMonth>11){STATE.calMonth=0;STATE.calYear++;}render();});
  qs('#cal-hoy')?.addEventListener('click',()=>{const n=new Date();STATE.calYear=n.getFullYear();STATE.calMonth=n.getMonth();render();});
  if(esEditor()){
    document.querySelectorAll('[data-pagar]').forEach(b=>b.addEventListener('click',()=>{
      STATE.prestamos=STATE.prestamos.map(p=>p.id==b.dataset.pagar?{...p,estado:'PAGADO'}:p);guardar();toast('✅ Marcado como cobrado');render();
    }));
    document.querySelectorAll('[data-vencer]').forEach(b=>b.addEventListener('click',()=>{
      STATE.prestamos=STATE.prestamos.map(p=>p.id==b.dataset.vencer?{...p,estado:'VENCIDO'}:p);guardar();toast('⚠️ Marcado como vencido');render();
    }));
    document.querySelectorAll('[data-del-pr]').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('¿Eliminar?'))return;STATE.prestamos=STATE.prestamos.filter(p=>p.id!=b.dataset.delPr);guardar();toast('🗑️ Eliminado');render();
    }));
    document.querySelectorAll('[data-del-ap]').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('¿Eliminar?'))return;STATE.aportes=STATE.aportes.filter(a=>a.id!=b.dataset.delAp);guardar();toast('🗑️ Eliminado');render();
    }));
    document.querySelectorAll('[data-del-pg]').forEach(b=>b.addEventListener('click',()=>{
      if(!confirm('¿Eliminar?'))return;STATE.pagos=STATE.pagos.filter(p=>p.id!=b.dataset.delPg);guardar();toast('🗑️ Eliminado');render();
    }));
    document.querySelectorAll('[data-edit-pr]').forEach(b=>b.addEventListener('click',()=>{const p=STATE.prestamos.find(x=>x.id==b.dataset.editPr);if(p)abrirModal('prestamo',p);}));
    document.querySelectorAll('[data-edit-ap]').forEach(b=>b.addEventListener('click',()=>{const a=STATE.aportes.find(x=>x.id==b.dataset.editAp);if(a)abrirModal('aporte',a);}));
    document.querySelectorAll('[data-edit-pg]').forEach(b=>b.addEventListener('click',()=>{const p=STATE.pagos.find(x=>x.id==b.dataset.editPg);if(p)abrirModal('pago',p,calcular());}));
  }
}

let modalEl=null;
function cerrarModal(){if(modalEl){modalEl.remove();modalEl=null;}}
function abrirModal(tipo,datos=null,st=null){
  cerrarModal();modalEl=document.createElement('div');modalEl.className='modal-overlay';
  if(tipo==='prestamo')  modalEl.innerHTML=htmlModalPrestamo(datos);
  else if(tipo==='aporte')    modalEl.innerHTML=htmlModalAporte(datos);
  else if(tipo==='pago')      modalEl.innerHTML=htmlModalPago(datos,st||calcular());
  else if(tipo==='config')    modalEl.innerHTML=htmlModalConfig();
  else if(tipo==='permisos')  modalEl.innerHTML=htmlModalPermisos();
  else if(tipo==='setup')     modalEl.innerHTML=htmlModalSetup();
  document.body.appendChild(modalEl);
  modalEl.addEventListener('click',e=>{if(e.target===modalEl)cerrarModal();});
  modalEl.querySelector('.modal-close')?.addEventListener('click',cerrarModal);
  if(tipo==='prestamo') bindModalPrestamo(datos);
  else if(tipo==='aporte')   bindModalAporte(datos);
  else if(tipo==='pago')     bindModalPago(datos,st||calcular());
  else if(tipo==='config')   bindModalConfig();
  else if(tipo==='permisos') bindModalPermisos();
}

  <div class="modal-body">
    <label class="field-lbl">Cliente / Deudor</label><input id="m-cliente" value="${e.cliente||''}" placeholder="Nombre del cliente" style="margin-bottom:10px">
    <div class="g2 mb10"><div><label class="field-lbl">Fecha del préstamo</label><input type="date" id="m-fecha" value="${e.fecha||''}"></div>
    <div><label class="field-lbl">Fecha de vencimiento</label><input type="date" id="m-venc" value="${e.fechaVenc||''}"></div></div>
    <div class="g3 mb10">
      <div><label class="field-lbl">Monto (S/)</label><input type="number" id="m-monto" value="${e.monto||''}" placeholder="0.00" step="0.01" min="0"></div>
      <div><label class="field-lbl">Interés %</label><input type="number" id="m-int" value="${e.interesPct??15}" step="0.5" min="0"></div>
      <div><label class="field-lbl">Plazo (meses)</label><input type="number" id="m-meses" value="${e.meses??1}" min="1"></div>
    </div>
    <div style="margin-bottom:14px"><label class="field-lbl">Estado</label>
      <select id="m-estado">${['PENDIENTE','PAGADO','VENCIDO'].map(s=>`<option${s===(e.estado||'PENDIENTE')?' selected':''}>${s}</option>`).join('')}</select>
    </div>
    <div id="m-preview" class="preview-box" style="display:none"></div>
    <button class="btn btn-navy" id="m-submit" style="width:100%;justify-content:center">${d?'Guardar cambios':'Registrar préstamo'}</button>
  </div></div>`;

  qs('#m-perm-add')?.addEventListener('click',async()=>{
    const email=qs('#m-perm-email')?.value?.trim().toLowerCase();
    const nombre=qs('#m-perm-nombre')?.value?.trim();
    const rol=qs('#m-perm-rol')?.value;
    if(!email||!email.includes('@')){alert('Ingresa un correo válido');return;}
    if(permisos.find(p=>p.email===email)){toast('⚠️ Ese correo ya tiene acceso');return;}
    permisos=[...permisos,{email,nombre:nombre||email,rol}];
    await guardarPermisos();refrescarLista();toast('✅ Permiso agregado para '+email);
    qs('#m-perm-email').value='';qs('#m-perm-nombre').value='';
  });
  bindPermEvents();

function bindPermEvents(){
  modalEl?.querySelectorAll('.perm-rol-sel').forEach(sel=>sel.addEventListener('change',async e=>{
    const email=e.target.dataset.permEmail;const rol=e.target.value;
    permisos=permisos.map(p=>p.email===email?{...p,rol}:p);
    await guardarPermisos();toast('✅ Rol actualizado');
  }));
  modalEl?.querySelectorAll('[data-perm-del]').forEach(b=>b.addEventListener('click',async()=>{
    const email=b.dataset.permDel;if(!confirm(`¿Quitar acceso a ${email}?`))return;
    permisos=permisos.filter(p=>p.email!==email);await guardarPermisos();
    const l=modalEl?.querySelector('#permisos-lista');if(l)l.innerHTML=renderFilasPermisos();bindPermEvents();toast('🗑️ Acceso revocado');
  }));
}

function exportarExcel(){
  const st=calcular();const hoy=new Date().toLocaleDateString('es-PE');const wb=XLSX.utils.book_new();
  const wsR=XLSX.utils.aoa_to_sheet([[STATE.nombre+' — Sistema Contable'],['Generado el: '+hoy],[],['RESUMEN FINANCIERO'],['Indicador','Valor (S/)'],['Capital Total',st.totalCap],['Capital en Caja',st.cajaCap],['Capital Prestado',st.prestAct],['Intereses Cobrados',st.intCob],['Reserva (10%)',st.reserva],['Utilidades Distribuibles',st.dist],[],['PRÉSTAMOS'],['Estado','Cantidad'],['Cobrados',st.pagados],['Pendientes',st.pendientes],['Vencidos',st.vencidos],[],['POR SOCIO'],['Socio','Aportó','%','Le Corresponde','Recibió','Pendiente'],...st.socios.map(s=>[s.socio,s.totalAp,+(s.pct*100).toFixed(2),+s.ganado.toFixed(2),+s.recibido.toFixed(2),+s.pendiente.toFixed(2)])]);
  wsR['!cols']=[{wch:30},{wch:18}];XLSX.utils.book_append_sheet(wb,wsR,'Resumen');
  const wsPr=XLSX.utils.aoa_to_sheet([['#','Cliente','Fecha','Monto','Interés%','Total a Cobrar','Vencimiento','Estado'],...STATE.prestamos.slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1).map((p,i)=>[i+1,p.cliente,p.fecha,+p.monto,+p.interesPct,+(+p.monto+getInt(p)).toFixed(2),p.fechaVenc,estadoEfectivo(p)])]);
  XLSX.utils.book_append_sheet(wb,wsPr,'Préstamos');
  const pen=STATE.prestamos.filter(p=>estadoEfectivo(p)==='PENDIENTE').slice().sort((a,b)=>a.fechaVenc<b.fechaVenc?-1:1);
  const wsPen=XLSX.utils.aoa_to_sheet([['PENDIENTES — ordenados por vencimiento'],[],['#','Cliente','Monto','Total a Cobrar','Vencimiento','Días para Vencer'],...pen.map((p,i)=>{const d=Math.round((new Date(p.fechaVenc)-new Date(hoyStr()))/(1000*60*60*24));return[i+1,p.cliente,+p.monto,+(+p.monto+getInt(p)).toFixed(2),p.fechaVenc,d];})]);
  XLSX.utils.book_append_sheet(wb,wsPen,'Pendientes');
  const wsAp=XLSX.utils.aoa_to_sheet([['#','Fecha','Socio','Monto','Tipo','Concepto'],...STATE.aportes.slice().sort((a,b)=>a.fecha<b.fecha?-1:1).map((a,i)=>[i+1,a.fecha,a.socio,+a.monto,a.tipo,a.concepto||''])]);
  XLSX.utils.book_append_sheet(wb,wsAp,'Aportes');
  XLSX.writeFile(wb,`cooperativa_${hoyStr()}.xlsx`);toast('📊 Excel exportado');
}

        content:`Eres contador experto en cooperativas en Perú. Analiza brevemente:\nCapital: ${sol(st.totalCap)} | Caja: ${sol(st.cajaCap)} | Prestado: ${sol(st.prestAct)}\nIntereses cobrados: ${sol(st.intCob)} | Distribuible: ${sol(st.dist)}\nPréstamos: ${st.pagados} pagados, ${st.pendientes} pendientes, ${st.vencidos} vencidos\n${st.socios.map(s=>`${s.socio}: ${sol(s.totalAp)} (${pctF(s.pct)}), pendiente ${sol(s.pendiente)}`).join(' | ')}\nDa 3 observaciones concretas en español.`}]})});
    const d=await res.json();STATE.aiText=d.content[0].text;

// Callbacks cuando cargan los scripts de Google
window.addEventListener('load',()=>{
  if(typeof gapi!=='undefined') window.onGapiLoad();
  if(typeof google!=='undefined'&&google.accounts) window.onGsiLoad();
});
// Polyfill para cuando los scripts cargan después del load
const _orig_gapi_onload = window.gapiOnLoad;
Object.defineProperty(window,'gapi',{set(v){Object.defineProperty(window,'gapi',{value:v,writable:true,configurable:true});if(v&&v.load)window.onGapiLoad();},get(){return undefined;},configurable:true});
</script>

<!-- Cargar APIs de Google -->
<script src="https://apis.google.com/js/api.js?onload=onGapiLoad"></script>
<script src="https://accounts.google.com/gsi/client" onload="onGsiLoad()" async defer></script>
</body>
</html>
